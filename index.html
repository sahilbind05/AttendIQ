<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AttendanceIQ — Smart Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── TOKENS ─────────────────────────────────────────────── */
  :root{
    --bg:#0d0f12; --surface:#161920; --card:#1c2028;
    --border:#2a2f3a; --border2:#333a47;
    --text:#e8eaf0; --muted:#6b7280; --muted2:#9ca3af;
    --green:#22c55e; --green-dim:#16a34a33;
    --red:#ef4444;   --red-dim:#dc262633;
    --amber:#f59e0b; --amber-dim:#d9770633;
    --blue:#3b82f6;  --blue-dim:#2563eb33;
    --accent:#7c3aed;
    --radius:16px; --radius-sm:10px;
    --shadow:0 4px 24px #00000055;
    --transition:all .22s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"]{
    --bg:#f0f2f5; --surface:#ffffff; --card:#ffffff;
    --border:#e2e5ec; --border2:#d1d5db;
    --text:#111827; --muted:#6b7280; --muted2:#9ca3af;
    --green-dim:#dcfce7; --red-dim:#fee2e2;
    --amber-dim:#fef3c7; --blue-dim:#dbeafe;
    --shadow:0 4px 24px #0000001a;
  }

  /* ── RESET ──────────────────────────────────────────────── */
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;transition:var(--transition);}

  /* ── LAYOUT ─────────────────────────────────────────────── */
  .app{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{
    width:260px;min-height:100vh;background:var(--surface);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:28px 20px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
    transition:var(--transition);
  }
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
  .logo-icon{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,#7c3aed,#3b82f6);
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.3px;}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}

  .nav-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    margin-bottom:8px;padding-left:4px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);
    cursor:pointer;font-size:14px;color:var(--muted2);transition:var(--transition);margin-bottom:2px;
  }
  .nav-item:hover,.nav-item.active{background:var(--card);color:var(--text);}
  .nav-item.active{color:var(--accent);}
  .nav-icon{font-size:16px;width:20px;text-align:center;}

  .sidebar-bottom{margin-top:auto;}

  /* TARGET CONTROL */
  .target-box{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:14px;margin-top:12px;
  }
  .target-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500;}
  .target-row{display:flex;align-items:center;gap:8px;}
  .target-input{
    width:60px;background:var(--surface);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-size:20px;font-family:'Syne',sans-serif;
    font-weight:700;padding:6px 10px;text-align:center;outline:none;transition:var(--transition);
  }
  .target-input:focus{border-color:var(--accent);}
  .target-pct{font-size:22px;font-weight:700;color:var(--muted);}

  /* DARK MODE TOGGLE */
  .theme-toggle{
    display:flex;align-items:center;gap:10px;padding:10px 12px;
    border-radius:var(--radius-sm);cursor:pointer;font-size:13px;
    color:var(--muted2);border:1px solid var(--border);
    transition:var(--transition);background:var(--card);margin-top:8px;
  }
  .theme-toggle:hover{color:var(--text);border-color:var(--border2);}
  .toggle-switch{
    width:36px;height:20px;background:var(--border2);border-radius:99px;
    position:relative;transition:var(--transition);margin-left:auto;
  }
  .toggle-switch.on{background:var(--accent);}
  .toggle-knob{
    width:14px;height:14px;background:#fff;border-radius:50%;
    position:absolute;top:3px;left:3px;transition:var(--transition);
  }
  .toggle-switch.on .toggle-knob{transform:translateX(16px);}

  /* MAIN */
  .main{flex:1;padding:36px 40px;overflow-y:auto;min-width:0;}

  /* TOP BAR */
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;}
  .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.5px;}
  .page-sub{color:var(--muted);font-size:14px;margin-top:4px;}
  .date-badge{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:8px 14px;font-size:13px;color:var(--muted2);
  }

  /* SUMMARY STRIP */
  .summary-strip{
    display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;
  }
  .stat-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px;transition:var(--transition);
    position:relative;overflow:hidden;
  }
  .stat-card::after{
    content:'';position:absolute;inset:0;opacity:0;transition:var(--transition);
    background:linear-gradient(135deg,transparent,#ffffff08);
  }
  .stat-card:hover::after{opacity:1;}
  .stat-icon{font-size:22px;margin-bottom:10px;}
  .stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.5px;}
  .stat-key{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
  .stat-card.green .stat-val{color:var(--green);}
  .stat-card.red   .stat-val{color:var(--red);}

  /* OVERALL PROGRESS */
  .progress-section{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:24px;margin-bottom:32px;
  }
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .progress-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;}
  .overall-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;}
  .prog-bar-track{height:10px;background:var(--border);border-radius:99px;overflow:hidden;}
  .prog-bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .prog-info{display:flex;gap:20px;margin-top:12px;}
  .prog-badge{
    font-size:12px;padding:4px 10px;border-radius:99px;font-weight:500;
  }

  /* ADD FORM */
  .add-section{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:24px;margin-bottom:32px;
  }
  .section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:18px;
    display:flex;align-items:center;gap:8px;}
  .form-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:12px;align-items:end;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
  .field input{
    background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);
    color:var(--text);font-size:14px;padding:10px 14px;outline:none;
    font-family:'DM Sans',sans-serif;transition:var(--transition);
  }
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #7c3aed22;}
  .field input::placeholder{color:var(--muted);}
  .btn-add{
    background:linear-gradient(135deg,#7c3aed,#3b82f6);
    color:#fff;border:none;border-radius:var(--radius-sm);
    padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;
    font-family:'DM Sans',sans-serif;white-space:nowrap;
    transition:var(--transition);box-shadow:0 4px 15px #7c3aed44;
  }
  .btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px #7c3aed66;}
  .btn-add:active{transform:translateY(0);}

  /* SUBJECTS GRID */
  .subjects-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

  /* SUBJECT CARD */
  .subject-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:22px;
    transition:var(--transition);position:relative;overflow:hidden;
    animation:cardIn .3s cubic-bezier(.4,0,.2,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .subject-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow);}
  .card-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
  .card-stripe.green{background:linear-gradient(90deg,var(--green),#86efac);}
  .card-stripe.red{background:linear-gradient(90deg,var(--red),#fca5a5);}
  .card-stripe.amber{background:linear-gradient(90deg,var(--amber),#fcd34d);}

  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;margin-top:8px;}
  .card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.2px;line-height:1.3;}
  .card-pct{
    font-family:'Syne',sans-serif;font-weight:800;font-size:22px;
    padding:4px 12px;border-radius:99px;
  }
  .card-pct.green{color:var(--green);background:var(--green-dim);}
  .card-pct.red{color:var(--red);background:var(--red-dim);}
  .card-pct.amber{color:var(--amber);background:var(--amber-dim);}

  .card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .mini-stat{
    background:var(--surface);border-radius:var(--radius-sm);
    padding:10px;text-align:center;border:1px solid var(--border);
  }
  .mini-val{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;}
  .mini-key{font-size:11px;color:var(--muted);margin-top:2px;}

  .card-bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:12px;}
  .card-bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}

  .card-info{
    font-size:12px;color:var(--muted2);
    background:var(--surface);border-radius:var(--radius-sm);
    padding:8px 12px;margin-bottom:14px;border:1px solid var(--border);
    line-height:1.5;
  }
  .card-info span{color:var(--text);font-weight:600;}

  .card-actions{display:flex;gap:8px;}
  .btn-circle{
    flex:1;height:36px;border:1px solid var(--border2);border-radius:var(--radius-sm);
    background:var(--surface);color:var(--text);font-size:16px;font-weight:700;
    cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;
    gap:5px;font-family:'DM Sans',sans-serif;
  }
  .btn-circle.plus:hover{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .btn-circle.minus:hover{background:var(--red-dim);border-color:var(--red);color:var(--red);}
  .btn-circle.skip:hover{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
  .btn-circle.del:hover{background:var(--red-dim);border-color:var(--red);color:var(--red);}
  .btn-circle:active{transform:scale(.96);}

  /* EMPTY STATE */
  .empty{
    text-align:center;padding:60px 20px;color:var(--muted);
    border:2px dashed var(--border);border-radius:var(--radius);
    grid-column:1/-1;
  }
  .empty-icon{font-size:48px;margin-bottom:12px;}
  .empty-text{font-size:15px;}

  /* TOAST */
  .toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999;}
  .toast{
    background:var(--card);border:1px solid var(--border2);
    border-radius:var(--radius-sm);padding:12px 18px;
    font-size:13px;color:var(--text);box-shadow:var(--shadow);
    animation:toastIn .3s ease both;display:flex;align-items:center;gap:8px;
  }
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
  @keyframes toastOut{to{opacity:0;transform:translateX(20px)}}

  /* RESPONSIVE */
  @media(max-width:900px){
    .sidebar{display:none;}
    .main{padding:20px;}
    .summary-strip{grid-template-columns:repeat(2,1fr);}
    .form-row{grid-template-columns:1fr 1fr;gap:10px;}
    .btn-add-wrap{grid-column:1/-1;}
  }
  @media(max-width:560px){
    .summary-strip{grid-template-columns:1fr 1fr;}
    .subjects-grid{grid-template-columns:1fr;}
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
</style>
</head>
<body data-theme="dark">

<div class="app">
  <!-- ── SIDEBAR ──────────────────────────────────── -->
  <aside class="sidebar">
    <div>
      <div class="logo">
        <div class="logo-icon">📊</div>
        <div>
          <div class="logo-text">AttendIQ</div>
          <div class="logo-sub">Smart Tracker</div>
        </div>
      </div>

      <div class="nav-label">Menu</div>
      <div class="nav-item active"><span class="nav-icon">🏠</span> Dashboard</div>
      <div class="nav-item"><span class="nav-icon">📚</span> Subjects</div>
      <div class="nav-item"><span class="nav-icon">📅</span> Calendar</div>
      <div class="nav-item"><span class="nav-icon">📈</span> Analytics</div>
    </div>

    <div class="sidebar-bottom">
      <div class="nav-label">Settings</div>

      <!-- Target % -->
      <div class="target-box">
        <div class="target-label">Attendance Target</div>
        <div class="target-row">
          <input class="target-input" type="number" id="targetInput" min="1" max="100" value="75"/>
          <span class="target-pct">%</span>
        </div>
      </div>

      <!-- Dark mode -->
      <div class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">Dark Mode</span>
        <div class="toggle-switch on" id="themeSwitch"><div class="toggle-knob"></div></div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────── -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Attendance Dashboard</div>
        <div class="page-sub">Track your academic attendance intelligently</div>
      </div>
      <div class="date-badge" id="dateBadge"></div>
    </div>

    <!-- SUMMARY STATS -->
    <div class="summary-strip">
      <div class="stat-card">
        <div class="stat-icon">🗓️</div>
        <div class="stat-val" id="sumTotal">—</div>
        <div class="stat-key">Total Classes</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">✅</div>
        <div class="stat-val" id="sumAttended">—</div>
        <div class="stat-key">Attended</div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon">❌</div>
        <div class="stat-val" id="sumAbsent">—</div>
        <div class="stat-key">Absent</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-val" id="sumSubjects">—</div>
        <div class="stat-key">Subjects</div>
      </div>
    </div>

    <!-- OVERALL PROGRESS -->
    <div class="progress-section">
      <div class="progress-header">
        <div>
          <div class="progress-title">Overall Attendance</div>
          <div id="reqMsg" style="font-size:13px;color:var(--muted);margin-top:4px;"></div>
        </div>
        <div class="overall-pct" id="overallPct">—%</div>
      </div>
      <div class="prog-bar-track">
        <div class="prog-bar-fill" id="overallBar" style="width:0%;background:var(--green);"></div>
      </div>
      <div class="prog-info" id="progInfo"></div>
    </div>

    <!-- ADD SUBJECT -->
    <div class="add-section">
      <div class="section-title">➕ Add New Subject</div>
      <div class="form-row">
        <div class="field">
          <label>Subject Name</label>
          <input type="text" id="subjectName" placeholder="e.g. Data Structures"/>
        </div>
        <div class="field">
          <label>Total Classes</label>
          <input type="number" id="totalClasses" placeholder="e.g. 40" min="0"/>
        </div>
        <div class="field">
          <label>Attended</label>
          <input type="number" id="attendedClasses" placeholder="e.g. 34" min="0"/>
        </div>
        <div class="field btn-add-wrap">
          <label>&nbsp;</label>
          <button class="btn-add" onclick="addSubject()">Add Subject</button>
        </div>
      </div>
    </div>

    <!-- SUBJECT CARDS -->
    <div class="subjects-header">
      <div class="section-title" style="margin-bottom:0;">📚 Subjects</div>
      <div id="subjectCount" style="font-size:13px;color:var(--muted);"></div>
    </div>
    <div class="subjects-grid" id="subjectsGrid"></div>
  </main>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ── STATE ─────────────────────────────────── */
let subjects = [];  // [{id,name,total,attended}]
let target   = 75;  // attendance target %
let darkMode = true;

/* ── INIT ─────────────────────────────────── */
function init(){
  loadData();
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('targetInput').value = target;
  document.getElementById('targetInput').addEventListener('input', e=>{
    target = Math.min(100,Math.max(1,+e.target.value||75));
    saveData(); refreshUI();
  });
  refreshUI();
}

/* ── STORAGE ──────────────────────────────── */
function saveData(){
  localStorage.setItem('attendiq_subjects', JSON.stringify(subjects));
  localStorage.setItem('attendiq_target',   JSON.stringify(target));
  localStorage.setItem('attendiq_theme',    JSON.stringify(darkMode));
}
function loadData(){
  try{
    subjects = JSON.parse(localStorage.getItem('attendiq_subjects')) || [];
    target   = JSON.parse(localStorage.getItem('attendiq_target'))   || 75;
    darkMode = localStorage.getItem('attendiq_theme') !== null
               ? JSON.parse(localStorage.getItem('attendiq_theme')) : true;
  }catch(e){ subjects=[]; target=75; darkMode=true; }
  applyTheme();
}

/* ── THEME ────────────────────────────────── */
function applyTheme(){
  document.body.dataset.theme = darkMode ? 'dark' : 'light';
  document.getElementById('themeIcon').textContent  = darkMode ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = darkMode ? 'Dark Mode' : 'Light Mode';
  const sw = document.getElementById('themeSwitch');
  darkMode ? sw.classList.add('on') : sw.classList.remove('on');
}
function toggleTheme(){
  darkMode = !darkMode;
  applyTheme(); saveData();
}

/* ── SMART MATHS ─────────────────────────── */
function pct(att,tot){ return tot===0 ? 0 : (att/tot*100); }

// How many more classes needed to reach target?
// (att+x)/(tot+x) >= target/100  =>  x >= (target*tot - 100*att)/(100-target)
function classesNeeded(att,tot,tgt){
  if(tgt>=100) return att<tot ? Infinity : 0;
  const needed = (tgt*tot - 100*att)/(100-tgt);
  return Math.max(0, Math.ceil(needed));
}

// How many classes can be skipped and still stay at target?
// (att)/(tot+x) >= target/100  =>  x <= (100*att/target) - tot
function canSkip(att,tot,tgt){
  if(tgt<=0) return Infinity;
  const maxTot = Math.floor(att*100/tgt);
  return Math.max(0, maxTot-tot);
}

function colorClass(p,tgt){
  if(p>=tgt)       return 'green';
  if(p>=tgt-10)    return 'amber';
  return 'red';
}

/* ── ADD SUBJECT ─────────────────────────── */
function addSubject(){
  const name  = document.getElementById('subjectName').value.trim();
  const total = parseInt(document.getElementById('totalClasses').value)||0;
  const att   = parseInt(document.getElementById('attendedClasses').value)||0;

  if(!name){ toast('⚠️ Please enter a subject name.'); return; }
  if(att>total){ toast('⚠️ Attended cannot exceed total classes.'); return; }

  subjects.push({ id:Date.now(), name, total, attended:att });
  document.getElementById('subjectName').value='';
  document.getElementById('totalClasses').value='';
  document.getElementById('attendedClasses').value='';
  saveData(); refreshUI();
  toast(`✅ "${name}" added successfully!`);
}

/* ── MODIFY SUBJECT ─────────────────────── */
function markPresent(id){
  const s=subjects.find(x=>x.id===id); if(!s) return;
  s.total++; s.attended++;
  saveData(); refreshUI();
}
function markAbsent(id){
  const s=subjects.find(x=>x.id===id); if(!s) return;
  s.total++;
  saveData(); refreshUI();
}
function undoClass(id){
  const s=subjects.find(x=>x.id===id); if(!s) return;
  if(s.total<=0) return;
  s.total--;
  if(s.attended>s.total) s.attended=s.total;
  saveData(); refreshUI();
}
function deleteSubject(id){
  const s=subjects.find(x=>x.id===id);
  subjects=subjects.filter(x=>x.id!==id);
  saveData(); refreshUI();
  if(s) toast(`🗑️ "${s.name}" deleted.`);
}

/* ── REFRESH UI ──────────────────────────── */
function refreshUI(){
  // Summary stats
  const totTotal = subjects.reduce((a,s)=>a+s.total,0);
  const totAtt   = subjects.reduce((a,s)=>a+s.attended,0);
  const totAbs   = totTotal-totAtt;
  const ovPct    = pct(totAtt,totTotal);
  const col      = colorClass(ovPct,target);

  document.getElementById('sumTotal').textContent    = totTotal;
  document.getElementById('sumAttended').textContent = totAtt;
  document.getElementById('sumAbsent').textContent   = totAbs;
  document.getElementById('sumSubjects').textContent = subjects.length;
  document.getElementById('overallPct').textContent  = totTotal===0 ? '—%' : ovPct.toFixed(1)+'%';
  document.getElementById('overallPct').style.color  =
    col==='green'?'var(--green)':col==='amber'?'var(--amber)':'var(--red)';

  // Overall bar
  const bar=document.getElementById('overallBar');
  bar.style.width=(Math.min(100,ovPct))+'%';
  bar.style.background=col==='green'?'linear-gradient(90deg,var(--green),#86efac)':
                        col==='amber'?'linear-gradient(90deg,var(--amber),#fcd34d)':
                                      'linear-gradient(90deg,var(--red),#fca5a5)';

  // Req / can-skip message
  const reqEl=document.getElementById('reqMsg');
  const piEl =document.getElementById('progInfo');
  if(totTotal===0){
    reqEl.textContent='No data yet. Add subjects to begin.';
    piEl.innerHTML='';
  } else if(ovPct>=target){
    const skip=canSkip(totAtt,totTotal,target);
    reqEl.textContent = skip>0
      ? `You can afford to skip ${skip} more class${skip>1?'es':''}!`
      : `You're right at the target — don't miss any more!`;
    piEl.innerHTML=`<span class="prog-badge" style="background:var(--green-dim);color:var(--green)">✅ On Track</span>
                    <span class="prog-badge" style="background:var(--blue-dim);color:var(--blue)">${target}% Target</span>`;
  } else {
    const need=classesNeeded(totAtt,totTotal,target);
    reqEl.textContent=isFinite(need)
      ? `Attend ${need} consecutive class${need>1?'es':''} to reach ${target}% target.`
      : 'Attendance cannot reach target — consult your institution.';
    piEl.innerHTML=`<span class="prog-badge" style="background:var(--red-dim);color:var(--red)">⚠️ Below Target</span>
                    <span class="prog-badge" style="background:var(--amber-dim);color:var(--amber)">Need ${need} more</span>`;
  }

  // Subject count
  document.getElementById('subjectCount').textContent=
    subjects.length ? `${subjects.length} subject${subjects.length>1?'s':''}` : '';

  // Cards
  const grid=document.getElementById('subjectsGrid');
  if(subjects.length===0){
    grid.innerHTML=`<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">No subjects yet. Add one above to get started.</div>
    </div>`;
    return;
  }
  grid.innerHTML=subjects.map(s=>{
    const p     = pct(s.attended,s.total);
    const col   = colorClass(p,target);
    const need  = classesNeeded(s.attended,s.total,target);
    const skip  = canSkip(s.attended,s.total,target);
    const info  = p>=target
      ? (skip>0 ? `Can skip <span>${skip}</span> class${skip>1?'es':''} & stay safe.` : `Right at target. Don't miss any!`)
      : (isFinite(need) ? `Need <span>${need}</span> consecutive class${need>1?'es':''} to reach ${target}%.` : `Cannot reach ${target}% target.`);
    return `
    <div class="subject-card" id="card-${s.id}">
      <div class="card-stripe ${col}"></div>
      <div class="card-top">
        <div class="card-name">${escHtml(s.name)}</div>
        <div class="card-pct ${col}">${s.total===0?'—':p.toFixed(1)+'%'}</div>
      </div>
      <div class="card-stats">
        <div class="mini-stat">
          <div class="mini-val">${s.attended}</div>
          <div class="mini-key">Attended</div>
        </div>
        <div class="mini-stat">
          <div class="mini-val">${s.total}</div>
          <div class="mini-key">Total</div>
        </div>
      </div>
      <div class="card-bar-track">
        <div class="card-bar-fill" style="width:${Math.min(100,p)}%;
          background:${col==='green'?'linear-gradient(90deg,var(--green),#86efac)':
                       col==='amber'?'linear-gradient(90deg,var(--amber),#fcd34d)':
                                     'linear-gradient(90deg,var(--red),#fca5a5)'}">
        </div>
      </div>
      <div class="card-info">${info}</div>
      <div class="card-actions">
        <button class="btn-circle plus" onclick="markPresent(${s.id})" title="Present (Total+1, Attended+1)">✅ Present</button>
        <button class="btn-circle minus" onclick="markAbsent(${s.id})"  title="Absent (Total+1 only)">❌ Absent</button>
        <button class="btn-circle skip"  onclick="undoClass(${s.id})"   title="Undo last class">↩</button>
        <button class="btn-circle del"   onclick="deleteSubject(${s.id})" title="Delete subject">🗑</button>
      </div>
    </div>`;
  }).join('');
}

/* ── TOAST ───────────────────────────────── */
function toast(msg,duration=3000){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>{
    el.style.animation='toastOut .3s ease forwards';
    setTimeout(()=>el.remove(),300);
  },duration);
}

/* ── UTILS ───────────────────────────────── */
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── KEYBOARD SHORTCUT ───────────────────── */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.activeElement.id==='subjectName') addSubject();
});

/* ── KICK OFF ────────────────────────────── */
init();
</script>
